<!DOCTYPE html>
<html>
    <head>
        <title>Property Owner Signup</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <style>
            .pink-underline {
                color: #f0657d;
                text-decoration: none;
                position: relative;
                font-weight: 500;
            }

            .pink-underline::after {
                content: "";
                position: absolute;
                left: 0;
                bottom: -2px;
                width: 100%;
                height: 2px;
                background-color: #f0657d;
                transform: scaleX(0);
                transition: transform 0.3s ease;
            }

            .pink-underline:hover::after {
                transform: scaleX(1);
            }

            .contact-wrap {
                border-radius: 25px;
            }

            .custom-swal-btn{
                background:#ff385c !important;

                color:white !important;

                border:none !important;

                outline:none !important;

                box-shadow:none !important;

                width:160px;

                height:55px;

                border-radius:14px;

                font-size:20px;

                font-weight:600;

                transition:0.3s;
            }

            .custom-swal-btn:hover{
                background:#ff2d55 !important;

                transform:scale(1.1);
            }

            .custom-swal-btn:active{
                opacity: 0.5;
            }

            .custom-swal-btn:focus{
                outline:none !important;

                box-shadow:none !important;

                border:none !important;
            }

            .custom-cancel-btn{

                background:#ff2d55 !important;

                color:white !important;

                border:none !important;

                outline:none !important;

                box-shadow:none !important;

                width:160px;

                margin-left: 25px;

                height:55px;

                border-radius:14px;

                font-size:18px;

                font-weight:600;

                margin-right:12px;

                transition:0.3s;
            }

            .custom-cancel-btn:hover{
                transform: scale(1.1);
                background:#ff2d55 !important;
                opacity: 0.3;
            }

            .custom-select {
                height: 52px;
                border-radius: 12px;
                border: 1.5px solid #e5e7eb;
                padding: 0 14px;
                font-size: 15px;
                background-color: #fff;
                transition: all 0.25s ease;
            }

            .custom-select:focus {
                border-color: #f0657d;
                box-shadow: 0 0 0 0.2rem rgba(240, 101, 125, 0.15);
            }

            .custom-select:hover {
                border-color: #d1d5db;
            }
        </style>

        <script>
            function signup() {
                const name = document.getElementById("name").value;
                const email = document.getElementById("email").value;
                const pass = document.getElementById("pass").value;
                const city = document.getElementById("city").value;
                const contact = document.getElementById("contact").value;
                const cpass = document.getElementById("cpass").value;
                const brandname = document.getElementById("brandname").value;
//                const status = document.getElementById("status").value;

                if (name === "" || email === "" || pass === "" || city === "" || contact === "" || cpass === "" || brandname === "") {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Incomplete Details!',
                        text: 'Please fill all the details!',

                        confirmButtonText: 'okay',
                        confirmButtonColor: '#ff385c',

                        customClass: {
                            confirmButton: 'custom-swal-btn'
                        },

                        buttonStyling: false

                    });
                } else if (pass !== cpass) {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Password does not match!',

                        confirmButtonText: 'okay',
                        confirmButtonColor: '#ff385c',

                        customClass: {
                            confirmButton: 'custom-swal-btn'
                        },

                        buttonStyling: false
                    });
                } else {

                    let formData = new FormData();

                    formData.append("name", name);
                    formData.append("email", email);
                    formData.append("pass", pass);
                    formData.append("cpass", cpass);
                    formData.append("city", city);
                    formData.append("contact", contact);
                    formData.append("brandname", brandname);
//                    formData.append("status", status);

                    const url = "OwnerSignup";

                    fetch(url, {method: "POST", body: formData})
                            .then(response => response.text())
                            .then(ans => renderHTML(ans));
                }
            }

            function renderHTML(ans) {
                console.log(ans);

//                document.getElementById("div1").innerHTML = ans;

                if (ans === "1") {
                    Swal.fire({
                        icon: 'success',
                        title: 'Owner Added Successfully!',

                        confirmButtonColor: '#ff385c',

                        customClass: {
                            confirmButton: 'custom-swal-btn'
                        },

                        buttonStyling: false
                    }).then(() => {
                        window.location.href = "/PropertyOwnerLogin";
                    });

                } else {
                    Swal.fire({
                        icon: 'warning',
                        title: 'Owner already exists!',

                        timer: 1600,

                        showConfirmButton: false
                    });
                }
            }

            function loadCities() {
                const url = `getCities`;
                fetch(url).then(response => response.text()).then(ans => {
                    const data = JSON.parse(ans).ans;
                    console.log(data);
                    let s = `<option value=''>Select City</option>`;

                    for (let i = 0; i < data.length; i++) {
                        let obj = data[i];
                        s += `
                                <option value='${obj.cityid}'>
                                    ${obj.cityname}, ${obj.statename}, ${obj.countryname}
                                </option>
                            `;
                    }
                    document.getElementById("city").innerHTML = s;

                });
            }
        </script>

    <div th:replace="~{owner_fragments :: owner_links}"></div>
</head>

                                    <div class="col-md-6">

                                            <select id="city" class="form-label custom-select">

                                            </select>

                                    </div>
                                    <div class="col-md-6">

                                    </div>

                                                                            </div>

<!--                                    <div class="col-md-4">
