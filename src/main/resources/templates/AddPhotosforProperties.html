<!DOCTYPE html>
<html>
    <head>
        <title>Add Photos</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <div th:replace="~{owner_fragments :: owner_links}"></div>
    <script>

        function getId() {
            const params = new URLSearchParams(window.location.search);
            return params.get("id");
        }

        function uploadPhoto() {
            const id = getId();

            const files = document.getElementById("photo").files;

            if (files.length === 0) {
                Swal.fire({
                    icon: 'warning',
                    title: 'Please select photos!',
                    timer: 1600,
                    showConfirmButton: false
                });
                return;
            }

            const formdata = new FormData();
            formdata.append("id", id);

            for (let i = 0; i < files.length; i++) {

                formdata.append("photo", files[i]);
            }

            const url = `/uploadPhoto`;

            fetch(url, {method: "POST", body: formdata})
                    .then(res => res.text())
                    .then(ans => {
                        Swal.fire({
                            icon: 'success',
                            title: 'Photo added successfully!',
                            showConfirmButton: true,

                            customClass: {
                                confirmButton: 'custom-swal-btn'
                            }
                        }).then(() => {
                            document.getElementById("photo").value = "";
                            loadPhotos(id);
                        });

                    })
                    .catch(err => {
                        console.log(err);
                        Swal.fire({
                            icon: 'warning',
                            title: 'Upload Failed!',
                            showConfirmButton: true,

                            customClass: {
                                confirmButton: 'custom-swal-btn'
                            }
                        });
                    });
        }


        function loadPhotos() {
            const id = getId();
            const url = `/getPropertyPhotos`;

            const formData = new FormData();
            formData.append("id", id);

            fetch(url, {method: "POST", body: formData})
                    .then(res => res.text())
                    .then(ans => {
                        console.log(ans);

                        const data = JSON.parse(ans).ans;

                        if (data.length === 0) {
                            document.getElementById("your-photos").innerText = "No Property Photos Found!";
                        }

                        if (!data) {
                            console.log("No data");
                            return;
                        }
                        let s = "";

                        for (let i = 0; i < data.length; i++) {

                            s += `
                                <div class="col-lg-4 col-md-6">
                                    <div class="single_expert">

                                        <div class="expert_thumb">
                                            <img src="${data[i].photo}" 
                                     style="width:100%; height:250px; object-fit:cover; border-radius:10px;" class="mb-3">
                                        </div>

                                        <div class="experts_name text-center">
                                            <button onclick="deletePhoto(${data[i].photoid})"
                                               class="btn btn-primary mb-4">
                                                Delete
                                            </button>
                                        </div>

                                    </div>
                                </div>`;
                        }

                        document.getElementById("gallery").innerHTML = s;
                    })
                    .catch(err => {
                        console.log("API error:", err);
                    });
        }


        // ✅ DELETE (FIXED)
        function deletePhoto(id) {

//            if (!confirm("Are you sure you want to delete this photo?")) {
//                return;
//            }

            Swal.fire({
                title: 'Are you sure you want to delete this photo?',
//                text: 'You want to logout?',
                icon: 'warning',

                showCancelButton: true,
                confirmButtonText: 'Yes',
                confirmButtonColor: '#ff385c',

                customClass: {
                    confirmButton: 'custom-swal-btn',
                    cancelButton: 'custom-cancel-btn'
                }

            }).then((result) => {
                if (result.isConfirmed) {
                    const url = `deletePropertyPhoto`;

                    const formData = new FormData();
                    formData.append("id", id);

                    fetch(url, {method: "POST", body: formData})
                            .then(res => res.text())
                            .then(ans => {
                                if (ans === "1") {
                                    Swal.fire({
                                        icon: 'success',
                                        title: 'Photo Deleted Successfully!',
                                        timer: 1600,

                                        showConfirmButton: false
                                    });
                                } else {
                                    Swal.fire({
                                        icon: 'warning',
                                        title: 'Photo Deleted Unsuccessfully!',
                                        timer: 1600,

                                        showConfirmButton: false
                                    });
                                }
                        loadPhotos();
                            })
                            .catch(err => {
                                console.log(err);
                                alert("Delete failed");
                                Swal.fire({
                                    icon: 'warning',
                                    title: 'Delete failed',
                                    timer: 1600,

                                    showConfirmButton: false
                                });
                            });
                }
            });


        }

        function confirmOwnerLogout(event) {
            event.preventDefault();
            
            Swal.fire({
                title: 'Are you Sure?',
                text: 'You want to logout?',
                icon: 'warning',

                showCancelButton: true,
                confirmButtonText: 'Yes',
                confirmButtonColor: '#ff385c',

                customClass: {
                    confirmButton: 'custom-swal-btn',
                    cancelButton: 'custom-cancel-btn'
                }

            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "/PropertyOwnerLogout";
                }
            });
            return false;
        }

    </script>

    <style>
        .custom-swal-btn{
            background:#ff385c !important;

            color:white !important;

            border:none !important;

            outline:none !important;

            box-shadow:none !important;

            width:160px;

            height:55px;

            border-radius:14px;

            font-size:20px;

            font-weight:600;

            transition:0.3s;
        }

        .custom-swal-btn:hover{
            background:#ff2d55 !important;

            transform:scale(1.1);
        }

        .custom-swal-btn:active{
            opacity: 0.5;
        }

        .custom-swal-btn:focus{
            outline:none !important;

            box-shadow:none !important;

            border:none !important;
        }

        .custom-cancel-btn{

            background:#ff2d55 !important;

            color:white !important;

            border:none !important;

            outline:none !important;

            box-shadow:none !important;

            width:160px;

            margin-left: 25px;

            height:55px;

            border-radius:14px;

            font-size:18px;

            font-weight:600;

            margin-right:12px;

            transition:0.3s;
        }

        .custom-cancel-btn:hover{
            transform: scale(1.1);
            background:#ff2d55 !important;
            opacity: 0.3;
        }
    </style>
</head>
<body onload="loadPhotos()">


    <div th:replace="~{owner_fragments :: owner_header}"></div>

    <div style="padding: 140px 0 80px 0; background:#f7f7f7;">

        <div style="
             width: 50%;
             margin: auto;
             background:white;
             padding:40px;
             border-radius:12px;
             box-shadow:0 5px 20px rgba(0,0,0,0.08);
             ">

            <h2 style="text-align:center; margin-bottom:30px;">Upload Photos</h2>


            <div style="border:2px dashed #ccc; padding:30px; text-align:center; margin-bottom:20px; border-radius:8px;">
                <input type="file" id="photo" style="width:100%; padding:10px;" multiple>
            </div>

            <div style="display:flex; gap:20px;">

                <!-- Add Photo Button -->
                <button class="btn btn-primary" onclick="uploadPhoto()" style="width:50%; padding:12px; color:white; border:none; border-radius:5px; cursor:pointer;">
                    Add Photo
                </button>

                <!-- Doctor Dashboard Button -->
                <button class="btn btn-primary" onclick="window.location.href = 'index'" 
                        style="width:50%; padding:12px; color:white; border:none; border-radius:5px; cursor:pointer;">
                    User Home
                </button>

            </div>

        </div>
        <div class="expert_doctors_area">
            <div class="container">
                <br>
                <hr>
                <div class="row justify-content-center ">
                    <div class="col-lg-6 my-5">
                        <div class="section_title mb-55 text-center">
                            <h3>Your Photos</h3>
                            <h3 class="heading mt-5" id="your-photos"></h3>
                        </div>
                    </div>
                </div>


                <div class="row" id="gallery"></div>

            </div>
        </div>

    </div>



    <div th:replace="~{owner_fragments :: owner_footer}"></div>
    <div th:replace="~{owner_fragments :: owner_script}"></div>





</body>
</html>
