    <script>
        function cash()
        {
//            alert("Cash");
            Swal.fire({
                icon: 'warning',
                title: 'Cash?',
                text: 'Do you want to pay with cash?',
                showConfirmButton: true,
                showCancelButton: true,

                customClass: {
                    confirmButton: 'custom-swal-btn',
                    cancelButton: 'custom-cancel-btn'
                }
            }).then((result) => {
                if (result.isConfirmed) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const id = urlParams.get("detail_id");
                    const finalTotal = urlParams.get("finalTotal");
                    const start = urlParams.get("start");
                    const end = urlParams.get("end");
                    const type = "cash";

                    var url = "./cash?detail_id=" + id + "&grand=" + finalTotal + "&start=" + start + "&end=" + end + "&type=" + type;
                    fetch(url)
                            .then(response => response.text())
                            .then(ans => renderAsHtml(ans));
                }
            });
        }


        function renderAsHtml(ans)
        {
//            alert(ans);

            Swal.fire({
                icon: 'success',
                title: 'Slot Booked!',
                text: 'Please pay cash to the owner',

                showConfirmButton: false,
                timer: 2000
            }).then(() => {
                window.location.href = "/";
            });
//            console.log(ans);        
            }

                    const finalTotal = urlParams.get("finalTotal");
                    const start = urlParams.get("start");
                    const end = urlParams.get("end");
                    const type = "online";

                    var url = "./cash?detail_id=" + id + "&grand=" + finalTotal + "&start=" + start + "&end=" + end + "&type=" + type;
                    fetch(url)
                            .then(response => response.text())
                            .then(ans => renderHtml(ans));
//                }
//            });
        }
        
        
        function renderHtml(ans)
        {
//            alert(ans);
            Swal.fire({
                icon: 'success',
                title: 'Slot Booked!',
                text: 'Online transaction is successful!',

                showConfirmButton: false,
                timer: 1200
            }).then(() => {
                window.location.href = "/";
            });
        }

        function confirmUserLogout(event) {
            event.preventDefault();

            Swal.fire({
                title: 'Are you Sure?',
                text: 'You want to logout?',
                icon: 'warning',

                showCancelButton: true,
                confirmButtonText: 'Yes',
                confirmButtonColor: '#ff385c',

                customClass: {
                    confirmButton: 'custom-swal-btn',
                    cancelButton: 'custom-cancel-btn'
                }

            }).then((result) => {
                if (result.isConfirmed) {
                    window.location.href = "/UserLogout";
                }
            });
            return false;
        }
    </script>
